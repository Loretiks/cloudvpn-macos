name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch mihomo core
        run: ./scripts/fetch-mihomo.sh

      - name: Generate project
        run: xcodegen generate

      # Unsigned build only — signing/notarization needs a paid Apple account + secrets.
      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project CloudVPN.xcodeproj \
            -scheme CloudVPN \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            build
